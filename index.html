<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0d2344">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Chanel & Armani">
<link rel="manifest" href="manifest.webmanifest?v=1">
<title>Chanel & Armani – Neubau</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#071426;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;touch-action:none;user-select:none;-webkit-user-select:none}
#game{position:fixed;inset:0;width:100%;height:100%;display:block;background:#8ed7ff}
#hud{position:fixed;left:max(8px,env(safe-area-inset-left));right:max(8px,env(safe-area-inset-right));top:max(6px,env(safe-area-inset-top));display:flex;justify-content:space-between;align-items:center;pointer-events:none;color:white;text-shadow:0 2px 4px #000;font-weight:800;font-size:clamp(13px,2.3vw,22px);z-index:5}
#hud .pill{background:#0009;border:2px solid #fff7;border-radius:16px;padding:7px 12px}
#controls{position:fixed;left:0;right:0;bottom:max(8px,env(safe-area-inset-bottom));display:flex;justify-content:space-between;align-items:flex-end;padding:0 max(10px,env(safe-area-inset-right)) 0 max(10px,env(safe-area-inset-left));z-index:10}
.pad,.actions{display:flex;gap:10px;align-items:flex-end}.btn{width:clamp(58px,13vw,86px);height:clamp(58px,13vw,86px);border-radius:50%;border:4px solid #432;background:#fffde8e8;box-shadow:0 6px 0 #7a5a0a;display:grid;place-items:center;font-size:clamp(25px,6vw,42px);font-weight:900;color:#174a80}.btn:active,.btn.on{transform:translateY(4px);box-shadow:0 2px 0 #7a5a0a;background:#ffe05b}.small{width:clamp(52px,11vw,74px);height:clamp(52px,11vw,74px);font-size:clamp(20px,4.7vw,34px)}
#overlay{position:fixed;inset:0;z-index:20;display:none;align-items:center;justify-content:center;background:#05152ed9;padding:20px}.card{max-width:720px;width:min(92vw,720px);background:#fff4dc;border:6px solid #4b321d;border-radius:28px;padding:22px;text-align:center;box-shadow:0 14px 40px #0008}.card h1{margin:.1em 0 .3em;color:#d33;font-size:clamp(34px,8vw,64px)}.card p{font-size:clamp(16px,3.5vw,24px)}.menuBtn{border:4px solid #5a3b16;border-radius:18px;background:#ffc83d;padding:14px 20px;margin:8px;font-weight:900;font-size:clamp(17px,3vw,24px);color:#07509f;box-shadow:0 6px 0 #7a5a0a}.menuBtn:active{transform:translateY(4px);box-shadow:0 2px 0 #7a5a0a}
#tip{position:fixed;left:50%;transform:translateX(-50%);bottom:25%;z-index:7;background:#fff8cc;border:4px solid #5c3b16;border-radius:18px;padding:10px 14px;font-weight:900;display:none;text-align:center;max-width:78vw}
@media (orientation:portrait){#hud{font-size:13px}.btn{width:58px;height:58px}.small{width:52px;height:52px}#controls{bottom:max(14px,env(safe-area-inset-bottom))}}
</style>
</head><body>
<canvas id="game"></canvas>
<div id="hud"><div class="pill" id="leftHud">Italien · Level 1/4</div><div class="pill" id="rightHud">⭐ 0　❤️ 3</div></div>
<div id="tip"></div>
<div id="controls">
  <div class="pad"><button class="btn" data-key="left">◀</button><button class="btn" data-key="right">▶</button></div>
  <div class="actions"><button class="btn small" data-key="swing">🕸️</button><button class="btn small" data-key="switch">🐻</button><button class="btn small" data-key="shoot">🎈</button><button class="btn" data-key="jump">⬆</button></div>
</div>
<div id="overlay"><div class="card" id="card"></div></div>
<script>
(()=>{'use strict';
const c=document.getElementById('game'),x=c.getContext('2d');
const hudL=document.getElementById('leftHud'),hudR=document.getElementById('rightHud'),tip=document.getElementById('tip'),overlay=document.getElementById('overlay'),card=document.getElementById('card');
let W=1280,H=720,DPR=1,last=0,keys={},state='menu',levelIndex=0,score=0,lives=3,active='Armani',world,player,camX=0,particles=[],shots=[],swing=null,tipShown=false,spaceGame=null;
const themes=[
 {name:'Italien',sky:['#68c9ff','#d7f4ff'],water:'#1b9eea',ground:'#9f6a34',grass:'#f3f0d6',accent:'#2f9b57'},
 {name:'Frankreich',sky:['#9ab8ff','#f0dcff'],water:'#527de5',ground:'#7d5f48',grass:'#d9d2ff',accent:'#9a6ad6'},
 {name:'Japan',sky:['#ffb6c9','#fff0e8'],water:'#4d9bd4',ground:'#704b3b',grass:'#f4d8dc',accent:'#de5277'},
 {name:'Brasilien',sky:['#66d7a1','#d8ffb3'],water:'#11a8bc',ground:'#6f4e2d',grass:'#d5f0a8',accent:'#f2c230'}
];
function resize(){DPR=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;c.width=W*DPR;c.height=H*DPR;c.style.width=W+'px';c.style.height=H+'px';x.setTransform(DPR,0,0,DPR,0,0)} addEventListener('resize',resize);resize();
function clamp(v,a,b){return Math.max(a,Math.min(b,v))} function rnd(a,b){return a+Math.random()*(b-a)} function hit(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}
function button(html,fn){const b=document.createElement('button');b.className='menuBtn';b.textContent=html;b.onclick=fn;return b}
function showMenu(){state='menu';overlay.style.display='flex';card.innerHTML='<h1>Chanel & Armani</h1><p>Kompletter technischer Neubau ohne alten Spielstand oder alten Cache.</p>';card.append(button('SPIEL STARTEN',()=>{overlay.style.display='none';levelIndex=0;score=0;lives=3;loadLevel()}));card.append(button('TEST: WELTRAUM',()=>{overlay.style.display='none';startSpaceBonus()}))}
function gameOver(win=false){state='over';overlay.style.display='flex';card.innerHTML=`<h1>${win?'GESCHAFFT!':'LOSER'}</h1><p>${win?'Alle Länder abgeschlossen.':'Versuche das aktuelle Level erneut.'}</p>`;card.append(button('NEUER VERSUCH',()=>{overlay.style.display='none';lives=3;loadLevel()}));card.append(button('HAUPTMENÜ',showMenu))}
function buildLevel(idx){const isBoss=idx===3;let plats=[{x:0,y:560,w:700,h:180},{x:780,y:500,w:450,h:240},{x:1310,y:430,w:430,h:310},{x:1820,y:520,w:500,h:220},{x:2420,y:450,w:520,h:290},{x:3050,y:540,w:700,h:200}];
 let mountains=[{x:250,y:470,w:170,h:90},{x:430,y:400,w:180,h:160},{x:950,y:410,w:190,h:90},{x:1430,y:330,w:200,h:100},{x:2070,y:410,w:180,h:110},{x:2600,y:350,w:230,h:100}];
 let palms=[{x:500,y:400,anchorY:250},{x:1050,y:410,anchorY:235},{x:1600,y:330,anchorY:180},{x:2210,y:430,anchorY:250},{x:2750,y:350,anchorY:190},{x:3350,y:450,anchorY:260}];
 if(!isBoss) palms=idx===0?palms:palms.filter((_,i)=>i%2===0); // Level 1 erklärt, Boss behält alle
 const enemies=[]; const addGround=(px,py,type='fox')=>enemies.push({kind:'ground',type,x:px,y:py,w:54,h:48,vx:70*(Math.random()<.5?-1:1),min:px-110,max:px+110,hp:2});
 addGround(900,450,'fox');addGround(1460,380,'boar');addGround(2040,470,'hedgehog');addGround(2650,400,'wolf');
 enemies.push({kind:'fly',type:'bat',x:1150,y:230,w:58,h:38,vx:65,min:1000,max:1300,hp:1},{kind:'fly',type:'bird',x:2350,y:220,w:64,h:42,vx:-70,min:2250,max:2600,hp:1});
 let boss=isBoss?{x:3450,y:420,w:140,h:140,hp:18,maxHp:18,vx:-75,min:3200,max:3600}:null;
 return {width:3750,plats,mountains,palms,enemies,boss,goal:{x:3660,y:450,w:60,h:100}}}
function loadLevel(){state='play';world=buildLevel(levelIndex);player={x:80,y:430,w:46,h:68,vx:0,vy:0,on:false,jumps:0,inv:0,face:1};camX=0;shots=[];particles=[];swing=null;tipShown=false;spaceGame=null;updateHud()}
function updateHud(){hudL.textContent=`${themes[levelIndex].name} · Level ${levelIndex+1}/4`;hudR.textContent=`⭐ ${score}　❤️ ${lives}`}
function loseLife(){if(player.inv>0)return;lives--;updateHud();if(lives<=0){gameOver(false);return} player.x=Math.max(40,camX+80);player.y=200;player.vx=0;player.vy=0;player.inv=1.8;swing=null}
function groundYAt(px){let best=9999;for(const p of [...world.plats,...world.mountains])if(px>p.x&&px<p.x+p.w)best=Math.min(best,p.y);return best}
function updatePlay(dt){const speed=270;player.vx=(keys.left?-speed:0)+(keys.right?speed:0);if(player.vx)player.face=Math.sign(player.vx);if(swing){const palm=swing.palm; swing.a+=(keys.right?1.5:0)-(keys.left?1.5:0);swing.av+=(-Math.sin(swing.a)*2.3 + (keys.right?1.1:0)-(keys.left?1.1:0))*dt;swing.av*=.995;swing.a+=swing.av;const L=swing.len;player.x=palm.x+Math.sin(swing.a)*L-player.w/2;player.y=palm.anchorY+Math.cos(swing.a)*L-player.h/2;player.vx=Math.cos(swing.a)*swing.av*L;player.vy=-Math.sin(swing.a)*swing.av*L}else{player.vy+=1500*dt;player.x+=player.vx*dt;player.y+=player.vy*dt;player.on=false;for(const p of [...world.plats,...world.mountains]){const prev=player.y-player.vy*dt+player.h;if(player.x+player.w>p.x&&player.x<p.x+p.w&&player.y+player.h>=p.y&&prev<=p.y+12&&player.vy>=0){player.y=p.y-player.h;player.vy=0;player.on=true;player.jumps=0}}}
 player.x=clamp(player.x,0,world.width-player.w);if(player.y>H+220)loseLife();if(player.inv>0)player.inv-=dt;
 for(const e of world.enemies){e.x+=e.vx*dt;if(e.x<e.min||e.x>e.max)e.vx*=-1;if(e.kind==='ground'){const gy=groundYAt(e.x+e.w/2);e.y=gy-e.h}else e.y+=Math.sin(performance.now()/350+e.x)*.35;if(hit(player,e)&&e.hp>0){if(player.vy>180&&!swing){e.hp=0;player.vy=-550;score+=20}else loseLife()}}
 world.enemies=world.enemies.filter(e=>e.hp>0);
 if(world.boss){const b=world.boss;b.x+=b.vx*dt;if(b.x<b.min||b.x>b.max)b.vx*=-1;b.y=groundYAt(b.x+b.w/2)-b.h;if(hit(player,b)){if(player.vy>220&&!swing){b.hp--;player.vy=-600;score+=30;if(b.hp<=0){score+=500;world.boss=null}}else loseLife()}}
 for(const s of shots){s.x+=s.vx*dt;s.life-=dt;for(const e of world.enemies)if(hit(s,e)){e.hp--;s.life=0;score+=10}if(world.boss&&hit(s,world.boss)){world.boss.hp--;s.life=0;if(world.boss.hp<=0){score+=500;world.boss=null}}}shots=shots.filter(s=>s.life>0&&s.x>0&&s.x<world.width);
 if(hit(player,world.goal)&&!world.boss){score+=100;if(levelIndex===1){startSpaceBonus();return}if(levelIndex<3){levelIndex++;loadLevel()}else gameOver(true)}
 camX+=(clamp(player.x-W*.36,0,Math.max(0,world.width-W))-camX)*Math.min(1,dt*4.5);updateHud();
 if(levelIndex===0&&!tipShown&&Math.abs(player.x-world.palms[0].x)<240){tip.style.display='block';tip.textContent='PALMENSCHWINGEN: 🕸️ greifen · ◀/▶ Schwung holen · ⬆ loslassen';setTimeout(()=>tip.style.display='none',7000);tipShown=true}}
function doJump(){if(state==='space'){spaceGame.player.vy=-300;return}if(state!=='play')return;if(swing){releaseSwing();return}if(player.jumps<2){player.vy=-620;player.jumps++}}
function toggleSwing(){if(state!=='play')return;if(swing){releaseSwing();return}let near=null,d=240;for(const p of world.palms){const dd=Math.hypot(player.x+player.w/2-p.x,player.y-p.anchorY);if(dd<d){d=dd;near=p}}if(near){const dx=player.x+player.w/2-near.x,dy=player.y+player.h/2-near.anchorY;swing={palm:near,len:Math.max(90,Math.hypot(dx,dy)),a:Math.atan2(dx,dy),av:.7*player.face}}}
function releaseSwing(){if(!swing)return;player.vx=Math.cos(swing.a)*swing.av*swing.len;player.vy=-Math.sin(swing.a)*swing.av*swing.len;swing=null}
function shoot(){if(state==='space'){spaceGame.shots.push({x:spaceGame.player.x+38,y:spaceGame.player.y+18,vx:520});return}if(state!=='play')return;shots.push({x:player.x+player.w/2,y:player.y+25,w:18,h:12,vx:600*player.face,life:2})}
function switchChar(){active=active==='Armani'?'Chanel':'Armani'}
function startSpaceBonus(){state='space';spaceGame={t:0,score:0,player:{x:80,y:H/2,w:56,h:42,vx:0,vy:0,hp:5},shots:[],enemies:[],boss:null,spawn:0};hudL.textContent='BONUS: Weltraum';hudR.textContent='⭐ 0　❤️ 5'}
function updateSpace(dt){const g=spaceGame,p=g.player;g.t+=dt;p.vx=((keys.right?1:0)-(keys.left?1:0))*260;p.vy=((keys.down?1:0)-(keys.up?1:0))*260;p.x=clamp(p.x+p.vx*dt,0,W*.55);p.y=clamp(p.y+p.vy*dt,70,H-100);g.spawn-=dt;if(g.spawn<=0&&!g.boss){g.spawn=.65;g.enemies.push({x:W+40,y:rnd(90,H-120),w:50,h:40,vx:-rnd(140,250),kind:['cat','owl','fox','bear'][Math.floor(rnd(0,4))],hp:1})}if(g.t>22&&!g.boss){g.enemies=[];g.boss={x:W-190,y:H/2-90,w:150,h:180,hp:30,max:30,vx:0}}
 for(const s of g.shots)s.x+=s.vx*dt;for(const e of g.enemies)e.x+=e.vx*dt;for(const s of g.shots)for(const e of g.enemies)if(hit({...s,w:12,h:6},e)){e.hp=0;s.dead=true;g.score+=20}if(g.boss){for(const s of g.shots)if(hit({...s,w:12,h:6},g.boss)){g.boss.hp--;s.dead=true;g.score+=5}if(g.boss.hp<=0){score+=g.score+500;levelIndex=2;loadLevel();return}}for(const e of g.enemies)if(hit(p,e)){e.hp=0;p.hp--;if(p.hp<=0){gameOver(false);return}}g.enemies=g.enemies.filter(e=>e.hp>0&&e.x>-80);g.shots=g.shots.filter(s=>!s.dead&&s.x<W+20);hudR.textContent=`⭐ ${g.score}　❤️ ${p.hp}`}
function bg(theme){const grd=x.createLinearGradient(0,0,0,H);grd.addColorStop(0,theme.sky[0]);grd.addColorStop(1,theme.sky[1]);x.fillStyle=grd;x.fillRect(0,0,W,H);x.fillStyle='#ffffffbb';for(let i=0;i<12;i++){const px=(i*211-camX*.12)% (W+200)-100,py=80+(i%4)*85;x.beginPath();x.ellipse(px,py,70,30,0,0,Math.PI*2);x.fill()}x.fillStyle=theme.water;x.fillRect(0,H*.72,W,H*.28);x.strokeStyle='#ffffff88';x.lineWidth=3;for(let y=H*.74;y<H;y+=28){x.beginPath();for(let q=0;q<W+40;q+=40)x.quadraticCurveTo(q+10,y-6,q+20,y),x.quadraticCurveTo(q+30,y+6,q+40,y);x.stroke()}}
function drawPalm(p){const sx=p.x-camX;x.save();x.translate(sx,p.anchorY);x.strokeStyle='#75502d';x.lineWidth=16;x.beginPath();x.moveTo(0,190);x.quadraticCurveTo(-20,90,0,0);x.stroke();x.fillStyle='#2d9b58';for(let i=0;i<7;i++){x.save();x.rotate(i*Math.PI*2/7);x.beginPath();x.ellipse(38,0,45,12,0,0,Math.PI*2);x.fill();x.restore()}x.restore()}
function drawDog(px,py,scale=1,evil=false){x.save();x.translate(px,py);x.scale(scale,scale);const black=active==='Armani'?'#171b22':'#f1eee6';x.fillStyle=evil?'#6f3d28':black;x.beginPath();x.ellipse(0,8,22,28,0,0,Math.PI*2);x.fill();x.beginPath();x.ellipse(0,-23,25,23,0,0,Math.PI*2);x.fill();x.fillStyle=evil?'#3b1a13':black;x.beginPath();x.moveTo(-21,-36);x.lineTo(-13,-61);x.lineTo(-4,-38);x.fill();x.beginPath();x.moveTo(21,-36);x.lineTo(13,-61);x.lineTo(4,-38);x.fill();x.fillStyle='#fff';x.beginPath();x.ellipse(-8,-25,6,9,0,0,Math.PI*2);x.ellipse(8,-25,6,9,0,0,Math.PI*2);x.fill();x.fillStyle=evil?'#f22':'#111';x.beginPath();x.arc(-7,-24,3,0,Math.PI*2);x.arc(7,-24,3,0,Math.PI*2);x.fill();x.fillStyle='#ba8b65';x.beginPath();x.ellipse(0,-10,13,10,0,0,Math.PI*2);x.fill();x.fillStyle='#111';x.beginPath();x.arc(0,-14,4,0,Math.PI*2);x.fill();x.strokeStyle='#111';x.lineWidth=4;x.beginPath();x.moveTo(-11,27);x.lineTo(-12,45);x.moveTo(11,27);x.lineTo(12,45);x.stroke();x.restore()}
function drawEnemy(e){const sx=e.x-camX,sy=e.y;if(e.kind==='fly'){x.save();x.translate(sx+e.w/2,sy+e.h/2);x.fillStyle=e.type==='bird'?'#ffd84c':'#33224e';x.beginPath();x.ellipse(0,0,24,16,0,0,Math.PI*2);x.fill();const flap=Math.sin(performance.now()/90)*.5;x.save();x.rotate(-.8+flap);x.beginPath();x.ellipse(-28,0,28,9,0,0,Math.PI*2);x.fill();x.restore();x.save();x.rotate(.8-flap);x.beginPath();x.ellipse(28,0,28,9,0,0,Math.PI*2);x.fill();x.restore();x.fillStyle='#fff';x.beginPath();x.arc(8,-5,5,0,Math.PI*2);x.fill();x.restore()}else{drawDog(sx+e.w/2,sy+e.h-8,.7,false)}}
function drawPlay(){const t=themes[levelIndex];bg(t);x.save();x.translate(0,0);for(const p of world.palms)drawPalm(p);for(const p of world.plats){x.fillStyle=t.ground;x.fillRect(p.x-camX,p.y,p.w,p.h);x.fillStyle=t.grass;x.fillRect(p.x-camX,p.y,p.w,14)}for(const m of world.mountains){x.fillStyle='#806246';x.beginPath();x.moveTo(m.x-camX,m.y+m.h);x.lineTo(m.x+m.w/2-camX,m.y);x.lineTo(m.x+m.w-camX,m.y+m.h);x.closePath();x.fill();x.fillStyle=t.grass;x.beginPath();x.moveTo(m.x+m.w/2-camX,m.y);x.lineTo(m.x+m.w*.64-camX,m.y+m.h*.35);x.lineTo(m.x+m.w*.46-camX,m.y+m.h*.25);x.closePath();x.fill()}for(const e of world.enemies)drawEnemy(e);if(world.boss){drawDog(world.boss.x-camX+70,world.boss.y+95,2.1,true);x.fillStyle='#0008';x.fillRect(W/2-160,70,320,22);x.fillStyle='#d22';x.fillRect(W/2-156,74,312*(world.boss.hp/world.boss.maxHp),14)}for(const s of shots){x.fillStyle='#ff4f8f';x.beginPath();x.ellipse(s.x-camX,s.y,10,7,0,0,Math.PI*2);x.fill()}if(swing){x.strokeStyle='#eee';x.lineWidth=4;x.beginPath();x.moveTo(swing.palm.x-camX,swing.palm.anchorY);x.lineTo(player.x-camX+player.w/2,player.y+player.h/2);x.stroke()}if(player.inv<=0||Math.floor(player.inv*10)%2===0)drawDog(player.x-camX+player.w/2,player.y+46,.92,false);x.fillStyle='#ffe44b';x.fillRect(world.goal.x-camX,world.goal.y,12,100);x.fillStyle='#fff';x.fillRect(world.goal.x-camX+12,world.goal.y,55,34);x.restore()}
function drawSpace(){x.fillStyle='#020515';x.fillRect(0,0,W,H);x.fillStyle='#fff';for(let i=0;i<90;i++){const px=(i*113-spaceGame.t*80)%W,py=(i*67)%H;x.fillRect(px,py,2+(i%3),2+(i%3))}const g=spaceGame,p=g.player;x.fillStyle='#63c7ff';x.beginPath();x.moveTo(p.x,p.y+20);x.lineTo(p.x+52,p.y);x.lineTo(p.x+52,p.y+40);x.closePath();x.fill();drawDog(p.x+28,p.y+25,.45,false);for(const s of g.shots){x.fillStyle='#ffef65';x.fillRect(s.x,s.y,14,5)}for(const e of g.enemies){x.save();x.translate(e.x,e.y);x.imageSmoothingEnabled=false;x.fillStyle='#6ee';x.fillRect(0,8,48,25);x.fillStyle='#fff';x.fillRect(8,0,10,10);x.fillRect(30,0,10,10);x.fillStyle='#111';x.fillRect(11,3,4,4);x.fillRect(33,3,4,4);x.restore()}if(g.boss){drawDog(g.boss.x+75,g.boss.y+110,2.2,true);x.fillStyle='#400';x.fillRect(W/2-160,70,320,20);x.fillStyle='#e33';x.fillRect(W/2-156,74,312*(g.boss.hp/g.boss.max),12)}}
function frame(ts){const dt=Math.min(.033,(ts-last)/1000||0);last=ts;if(state==='play')updatePlay(dt);else if(state==='space')updateSpace(dt);if(state==='play')drawPlay();else if(state==='space')drawSpace();else{bg(themes[0])}requestAnimationFrame(frame)}requestAnimationFrame(frame);
function keydown(e,on){const k=e.key.toLowerCase();if(['arrowleft','a'].includes(k))keys.left=on;if(['arrowright','d'].includes(k))keys.right=on;if(['arrowup','w'].includes(k))keys.up=on;if(['arrowdown','s'].includes(k))keys.down=on;if(on&&[' ','arrowup','w'].includes(k))doJump();if(on&&['e','shift'].includes(k))toggleSwing();if(on&&['f','enter'].includes(k))shoot();if(on&&k==='q')switchChar();e.preventDefault()}addEventListener('keydown',e=>keydown(e,true));addEventListener('keyup',e=>keydown(e,false));
document.querySelectorAll('[data-key]').forEach(b=>{const k=b.dataset.key;const set=v=>{b.classList.toggle('on',v);if(['left','right'].includes(k))keys[k]=v;if(v&&k==='jump')doJump();if(v&&k==='swing')toggleSwing();if(v&&k==='shoot')shoot();if(v&&k==='switch')switchChar()};b.addEventListener('pointerdown',e=>{e.preventDefault();set(true)});b.addEventListener('pointerup',e=>{e.preventDefault();set(false)});b.addEventListener('pointercancel',()=>set(false));});
// Alte Caches und Service Worker des früheren Spiels entfernen. Dieser Neubau läuft absichtlich ohne Cache.
if('serviceWorker'in navigator)navigator.serviceWorker.getRegistrations().then(rs=>rs.forEach(r=>r.unregister())).catch(()=>{});if('caches'in window)caches.keys().then(ks=>ks.forEach(k=>caches.delete(k))).catch(()=>{});
showMenu();
})();
